services:
  postgres:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d/
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/copy2
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      SYNONYM_SERVICE_URL: http://synonym-checker:8000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_ADMIN_FAIL_FAST: "false"
      SPRING_KAFKA_PROPERTIES_RECONNECT_BACKOFF_MS: 1000
      SPRING_KAFKA_PROPERTIES_RECONNECT_BACKOFF_MAX_MS: 10000
      SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: "*"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_started
      synonym-checker:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
        - "3000:80"
    networks:
      - app-network

  synonym-checker:
    build: ./synonym-checker
    volumes:
      - ./ml_models_cache:/root/.cache/torch/sentence_transformers
    ports:
      - '8000:8000'
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8000/docs' ]
      interval: 30s
      retries: 3
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - app-network
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
     - zookeeper
    ports:
     - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network
networks:
  app-network:

volumes:
  postgres_data: