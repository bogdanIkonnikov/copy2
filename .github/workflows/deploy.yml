name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository }}:main-${{ github.sha }}-${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      DOCKER_HOST: ${{ vars.MAIN_DOCKER_HOST }}
      CONTAINER_NAME: money-tracker-bot
    steps:
      - name: Install docker-rollout
        run: |
          mkdir -p ~/.docker/cli-plugins
          wget https://raw.githubusercontent.com/wowu/docker-rollout/main/docker-rollout \
            -P ~/.docker/cli-plugins/
          chmod +x ~/.docker/cli-plugins/docker-rollout

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config

      - name: Write env file
        run: echo "${{ secrets.MAIN_ENV_FILE }}" > .env

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ env.IMAGE }}"

      - name: Rollout
        run: docker rollout --env-file .env -t 10 ${{ env.CONTAINER_NAME }}

      - name: Upload compose log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-log
          path: compose.log