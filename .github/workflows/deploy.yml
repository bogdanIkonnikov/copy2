name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.prep.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Image Tag
        id: prep
        run: |
          REPO="${{ github.repository }}"
          IMAGE_NAME="ghcr.io/${REPO,,}" # ,, в bash переводит в нижний регистр
          TAG="${IMAGE_NAME}:main-${{ github.sha }}-${{ github.run_number }}"
          echo "image=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.prep.outputs.image }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      DOCKER_HOST: ${{ vars.MAIN_DOCKER_HOST }}
      CONTAINER_NAME: money-tracker-bot
      IMAGE: ${{ needs.build.outputs.image_tag }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull "${{ env.IMAGE }}"

      - name: Rollout
        run: docker rollout --env-file .env -t 10 ${{ env.CONTAINER_NAME }}